# docker-compose.yml — no 'version' field needed (Compose v2+)

# ─────────────────────────────────────────────────────────────────
#  Qphoria — Team Task Manager
#  Docker Compose — Production-like local setup
#
#  Usage:
#    docker-compose up --build          # Build and start
#    docker-compose up -d               # Start in background
#    docker-compose down                # Stop and remove containers
#    docker-compose down -v             # Also remove volumes (clears DB)
#    docker-compose logs -f backend     # Tail backend logs
# ─────────────────────────────────────────────────────────────────

services:

  # ── Backend — Express REST API ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: qphoria-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET:-qphoria_change_this_in_production}
      CORS_ORIGIN: http://localhost
    volumes:
      # Persist the JSON database across container restarts
      - db_data:/app/data
    ports:
      # Also expose directly for API clients / Postman (optional)
      - "5001:5001"
    networks:
      - qphoria_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend — React SPA served by Nginx ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # /api is relative — nginx proxies it to the backend container
        VITE_API_URL: /api
    container_name: qphoria-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - qphoria_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ── Named volume for DB persistence ──────────────────────────────
volumes:
  db_data:
    driver: local

# ── Internal bridge network ───────────────────────────────────────
networks:
  qphoria_net:
    driver: bridge
